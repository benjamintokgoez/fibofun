name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build web artefact
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install fibspiral
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Regenerate web/data.json
        run: python -m fibspiral.export web/data.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artefact (web/ directory)
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
